# OpsMind Schema Registry
# ========================
# Maps business domains to your actual database tables.
# OpsMind uses this to know which tables to query for each type of question.
#
# DEFAULT: Uses the demo SQLite schema (no changes needed for demo).
#
# FOR YOUR SQL SERVER: Uncomment and edit the section below to map
# your actual table and column names.
#
# Example for a real SQL Server ERP (SI Integreater):
#
# traceability:
#   description: Batch traceability from intake to dispatch
#   tables:
#     ProductionBatch: BatchID, BatchNo, ProductCode, ProductionDate, InputKg, OutputKg, WasteKg, YieldPct, LineNo
#     RawMaterialIntake: IntakeID, ProductCode, BatchNo, SupplierCode, QuantityKg, IntakeDate, ExpiryDate, TempOnArrival
#     Products: ProductCode, ProductName, Species, Category, CostPerKg, SellPricePerKg, Allergens
#     SalesOrders: OrderID, CustomerCode, ProductCode, QuantityKg, OrderDate, DeliveryDate, Status, PricePerKg
#     Customers: CustomerCode, CustomerName
#
# production:
#   description: Production runs and waste
#   tables:
#     ProductionBatch: BatchID, BatchNo, ProductCode, ProductionDate, InputKg, OutputKg, WasteKg, YieldPct, LineNo, Shift, OperatorName
#     Products: ProductCode, ProductName, Species, Category, CostPerKg
#     WasteRecords: WasteID, BatchID, WasteType, QuantityKg, Reason, WasteDate
#
# orders:
#   description: Customer orders
#   tables:
#     SalesOrders: OrderID, CustomerCode, ProductCode, QuantityKg, OrderDate, DeliveryDate, Status, PricePerKg
#     Customers: CustomerCode, CustomerName
#     Products: ProductCode, ProductName
#
# temperature:
#   description: Temperature monitoring
#   tables:
#     TemperatureLogs: LogID, LocationName, Temperature, RecordedAt, RecordedBy
#
# staff:
#   description: Staff and overtime
#   tables:
#     Employees: EmployeeID, FullName, Role, ShiftPattern, WeeklyHours, HourlyRate
#
# stock:
#   description: Stock levels and expiry
#   tables:
#     RawMaterialIntake: IntakeID, ProductCode, BatchNo, SupplierCode, QuantityKg, IntakeDate, ExpiryDate
#     Products: ProductCode, ProductName, Species
