name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Opt into Node.js 24 for JavaScript actions ahead of the mandatory Sep 2026
# switch. Closes #9. Actions (checkout@v4, setup-python@v5) now run on
# Node.js 24 on all runners; if any action breaks, the fix is upstream.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install ruff>=0.11
      - run: ruff check .
      - name: Type check (ty)
        run: |
          pip install ty
          ty check modules/ || true

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Seed demo database
        run: python scripts/seed_demo_db.py

      - name: Run tests
        # Runs legacy cross-module suite plus any focused per-module tests
        # that have been split out under tests/unit/. Eval is a separate step.
        run: python -m pytest tests/test_core.py tests/unit/ -v --tb=short

      - name: Run eval (library path only — no Ollama required)
        env:
          OPSMIND_EVAL_SKIP_LLM: "1"
        run: python -m pytest tests/eval/ -v -m eval_library --tb=short
